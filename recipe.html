<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LARDER — Recipe</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { background:"#d9e2cc", primary:"#2D331E", surface:"#d9e2cc", outline:"#b7c2a7" },
          fontFamily: { headline:["Newsreader","serif"], body:["Cormorant Garamond","serif"], label:["Newsreader","serif"] },
        },
      },
    };
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24; display:inline-block; line-height:1; }
    body { background:#d9e2cc; color:#2D331E; font-family:'Cormorant Garamond',serif; -webkit-font-smoothing:antialiased; }
    .distingue { font-family:'Newsreader',serif; font-weight:800; letter-spacing:-0.04em; line-height:0.85; text-transform:uppercase; }
    .divider { border-bottom:1px solid rgba(45,51,30,0.18); }
    .saved-btn { transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: fadeUp 0.4s ease forwards; opacity:0; }
  </style>
</head>
<body>

  <header class="fixed top-0 w-full z-50 flex justify-between items-center px-5 h-14 bg-background/92 backdrop-blur-sm divider">
    <button onclick="history.back()" class="flex items-center gap-1 text-primary hover:opacity-65 transition-opacity" aria-label="Back">
      <span class="material-symbols-outlined text-xl" aria-hidden="true">arrow_back</span>
    </button>
    <a href="index.html" class="distingue text-[1.25rem] tracking-widest">LARDER</a>
    <!-- Save button -->
    <button id="save-btn" class="saved-btn p-1.5 border border-primary/30 rounded-sm" aria-label="Save recipe" onclick="toggleSave()">
      <span id="save-icon" class="material-symbols-outlined text-xl text-primary">bookmark</span>
    </button>
  </header>

  <main id="main" class="pt-20 pb-28 px-5 max-w-5xl mx-auto">
    <!-- Populated by JS -->
  </main>

  <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-5 pt-2" style="background:rgba(217,226,204,0.95);border-top:1px solid rgba(45,51,30,0.15)">
    <a href="index.html" class="flex flex-col items-center text-primary/45 pt-2 hover:text-primary transition-colors">
      <span class="material-symbols-outlined mb-1 text-[1.1rem]" aria-hidden="true">calendar_today</span>
      <span class="distingue text-[0.5rem] tracking-widest font-normal">In Season</span>
    </a>
    <a href="recipes.html" class="flex flex-col items-center text-primary/45 pt-2 hover:text-primary transition-colors">
      <span class="material-symbols-outlined mb-1 text-[1.1rem]" aria-hidden="true">bookmark</span>
      <span class="distingue text-[0.5rem] tracking-widest font-normal">Recipes</span>
    </a>
    <a href="search.html" class="flex flex-col items-center text-primary/45 pt-2 hover:text-primary transition-colors">
      <span class="material-symbols-outlined mb-1 text-[1.1rem]" aria-hidden="true">search</span>
      <span class="distingue text-[0.5rem] tracking-widest font-normal">Search</span>
    </a>
  </nav>

  <script>
  const RECIPES = {
    'wild-garlic-pesto': {
      id: 'wild-garlic-pesto',
      name: 'Wild Garlic Pesto',
      ingredientId: 'wild-garlic',
      ingredient: 'Wild Garlic',
      number: '001',
      season: 'Spring Forage',
      description: 'Raw and vivid. A no-cook method that preserves the volatile aromatics of foraged leaves. Ready in under ten minutes.',
      prep: '10 mins', total: '10 mins', yield: '1 jar / 250ml', difficulty: 'Simple',
      ingredients: [
        ['Wild Garlic Leaves', '100g'],
        ['Pine Nuts, toasted', '50g'],
        ['Aged Parmesan, grated', '60g'],
        ['Cold-pressed Rapeseed Oil', '120ml'],
        ['Maldon Sea Salt', 'generous pinch'],
        ['Lemon', '½, juiced'],
      ],
      note: 'The quality of the oil is paramount. Use a cold-pressed variety with peppery notes.',
      steps: [
        ['Prepare the Leaves', 'Wash the wild garlic thoroughly under cold running water. Dry well — excess moisture dilutes the pesto and shortens shelf life. Remove any yellowed or damaged leaves.'],
        ['Build the Emulsion', 'Add the leaves, toasted pine nuts and lemon juice to a food processor. Pulse roughly five times — you want texture, not a smooth purée. With the motor running, drizzle in the rapeseed oil slowly until emulsified.'],
        ['Finish & Season', 'Fold in the grated parmesan by hand with a spatula. Do not blitz it. Season aggressively with Maldon salt, taste, and adjust with more lemon if the garlic flavour feels heavy.'],
        ['Store', 'Transfer to a sterilised jar. Seal with a thin layer of oil. Refrigerate immediately and use within seven days.'],
      ],
    },
    'wildgarlic-butter': {
      id: 'wildgarlic-butter',
      name: 'Wild Garlic Compound Butter',
      ingredientId: 'wild-garlic',
      ingredient: 'Wild Garlic',
      number: '002',
      season: 'Spring Forage',
      description: 'Leaves macerated into salted cultured butter, rolled and frozen in logs. Melts beautifully over grilled fish, steak or new potatoes.',
      prep: '15 mins', total: '15 mins + overnight', yield: '2 logs', difficulty: 'Simple',
      ingredients: [
        ['Unsalted Cultured Butter', '250g, softened'],
        ['Wild Garlic Leaves', '40g, finely chopped'],
        ['Maldon Sea Salt', '½ tsp'],
        ['Lemon Zest', '1 lemon'],
        ['Black Pepper', 'freshly ground'],
      ],
      note: 'Use cultured butter — the lactic acidity complements the garlic. Standard butter will work but is less complex.',
      steps: [
        ['Prepare the Garlic', 'Wash and dry the wild garlic leaves thoroughly. Chop very finely — you want them to distribute evenly through the butter rather than sitting in clumps.'],
        ['Combine', 'Beat the softened butter with a wooden spoon or spatula until smooth. Fold in the chopped leaves, lemon zest, salt and pepper until evenly incorporated.'],
        ['Form into Logs', 'Lay a sheet of parchment paper on the work surface. Spoon half the butter along one edge and roll tightly into a log, twisting the ends. Repeat with remaining butter.'],
        ['Chill or Freeze', 'Refrigerate for 24 hours before using, or freeze for up to 3 months. Slice into discs directly from frozen.'],
      ],
    },
    'jersey-royals-soup': {
      id: 'jersey-royals-soup',
      name: 'Jersey Royal & Wild Garlic Soup',
      ingredientId: 'jersey-royals',
      ingredient: 'Jersey Royals',
      number: '003',
      season: 'Spring',
      description: 'New-season Jersey Royals simmered in chicken stock, finished with wild garlic leaves stirred in at the last moment to preserve their freshness.',
      prep: '15 mins', total: '35 mins', yield: '4 servings', difficulty: 'Simple',
      ingredients: [
        ['Jersey Royals', '800g, halved'],
        ['Wild Garlic Leaves', '80g'],
        ['Good Chicken Stock', '900ml'],
        ['Shallots', '3, sliced'],
        ['Unsalted Butter', '40g'],
        ['Double Cream', '100ml'],
        ['Maldon Sea Salt', 'to taste'],
      ],
      note: 'Don\'t blend vigorously — a coarse, textured soup shows the quality of the potato.',
      steps: [
        ['Sweat the Shallots', 'Melt the butter in a heavy-bottomed pot over medium-low heat. Add the shallots and a pinch of salt. Cook gently for 8–10 minutes until completely soft and translucent — do not brown.'],
        ['Cook the Potatoes', 'Add the Jersey Royals and the chicken stock. Bring to a gentle simmer. Cook for 18–20 minutes until the potatoes yield easily to a knife tip.'],
        ['Blend Roughly', 'Use a hand blender to partially blitz the soup — you want some texture left. Stir in the double cream and taste for seasoning.'],
        ['Finish with Garlic', 'Remove from heat. Stir in the wild garlic leaves and leave for 90 seconds — just long enough for the heat to wilt them without cooking out their fragrance. Serve immediately.'],
      ],
    },
    'asparagus-hollandaise': {
      id: 'asparagus-hollandaise',
      name: 'Asparagus & Hollandaise',
      ingredientId: 'asparagus',
      ingredient: 'Asparagus',
      number: '004',
      season: 'Spring',
      description: 'The most classical of preparations. British asparagus at its peak requires nothing more than a properly made hollandaise.',
      prep: '10 mins', total: '20 mins', yield: '2 servings', difficulty: 'Intermediate',
      ingredients: [
        ['British Asparagus', '500g, woody ends snapped'],
        ['Egg Yolks', '3'],
        ['Unsalted Butter', '200g, clarified'],
        ['Lemon Juice', '1 tbsp'],
        ['White Wine Vinegar', '1 tbsp'],
        ['Maldon Sea Salt', 'to taste'],
      ],
      note: 'The emulsion will split if the butter is added too fast or the heat is too high. Patience is the technique.',
      steps: [
        ['Make the Reduction', 'Reduce the white wine vinegar with a splash of water and a crack of pepper in a small pan until you have about a teaspoon. Allow to cool slightly.'],
        ['Build the Hollandaise', 'Whisk the egg yolks with the reduction in a bowl over barely simmering water. Whisk continuously until pale and thickened — the whisk should leave a trail. Remove from heat and drizzle in the clarified butter, whisking constantly. Season with lemon and salt.'],
        ['Cook the Asparagus', 'Steam or boil the asparagus in well-salted water for 3–4 minutes — they should retain a slight bite. Drain thoroughly.'],
        ['Serve', 'Arrange the asparagus on warm plates. Spoon the hollandaise generously alongside. Eat immediately.'],
      ],
    },
    'strawberry-pavlova': {
      id: 'strawberry-pavlova',
      name: 'Pavlova with Strawberries',
      ingredientId: 'strawberries',
      ingredient: 'Strawberries',
      number: '005',
      season: 'Summer',
      description: 'A crisp meringue shell, marshmallow-soft within, heaped with barely-sweetened cream and ripe British strawberries.',
      prep: '25 mins', total: '1 hr 45 mins', yield: '8 servings', difficulty: 'Intermediate',
      ingredients: [
        ['Egg Whites', '6, at room temperature'],
        ['Caster Sugar', '300g'],
        ['White Wine Vinegar', '1 tsp'],
        ['Cornflour', '1 tsp'],
        ['Double Cream', '400ml'],
        ['British Strawberries', '500g, hulled'],
        ['Icing Sugar', '1 tbsp'],
      ],
      note: 'The meringue can be made a day ahead and stored in an airtight container. Add cream and fruit at the last minute.',
      steps: [
        ['Whisk the Whites', 'Whisk egg whites to stiff peaks. Add the caster sugar a tablespoon at a time, whisking between each addition until the meringue is thick, glossy and holds a stiff peak. Fold in the vinegar and cornflour.'],
        ['Shape and Bake', 'Spoon onto a parchment-lined tray, forming a rough circle with a slight indent in the centre. Bake at 120°C for 1 hour 15 minutes. Turn off the oven and leave the door ajar for a further 30 minutes.'],
        ['Prepare the Fruit', 'Halve or quarter the strawberries. Toss with a tablespoon of icing sugar and a squeeze of lemon. Leave to macerate for 20 minutes.'],
        ['Assemble', 'Whip the cream to soft peaks. Heap it into the cooled meringue. Top with the macerated strawberries and their juice. Serve immediately.'],
      ],
    },
    'mushroom-on-toast': {
      id: 'mushroom-on-toast',
      name: 'Wild Mushrooms on Toast',
      ingredientId: 'wild-mushrooms',
      ingredient: 'Wild Mushrooms',
      number: '006',
      season: 'Autumn',
      description: 'The simplest expression of wild mushrooms. High heat, good butter, thick toast. Let the mushrooms speak.',
      prep: '5 mins', total: '15 mins', yield: '2 servings', difficulty: 'Simple',
      ingredients: [
        ['Mixed Wild Mushrooms', '400g, torn into large pieces'],
        ['Unsalted Butter', '50g'],
        ['Garlic', '2 cloves, finely sliced'],
        ['Fresh Thyme', '4 sprigs'],
        ['Sourdough', '2 thick slices'],
        ['Maldon Sea Salt', 'to taste'],
        ['Flat-leaf Parsley', 'handful, chopped'],
      ],
      note: 'Do not crowd the pan. Cook in two batches if necessary — overcrowding steams rather than sears.',
      steps: [
        ['Heat the Pan', 'Get a large heavy pan extremely hot. This is the key step. The mushrooms must hit a scorching surface or they\'ll steam and go limp.'],
        ['Sear the Mushrooms', 'Add half the butter and immediately add the mushrooms in a single layer. Do not stir for 2 minutes. Flip once and cook a further 2 minutes. Season only at this point — salt draws moisture.'],
        ['Add the Aromatics', 'Reduce heat to medium. Add the remaining butter, garlic and thyme. Stir and cook for a further 2 minutes until the garlic is golden.'],
        ['Toast and Serve', 'Toast the sourdough under a grill or in a dry pan. Pile the mushrooms generously over the toast. Scatter with parsley and finish with a crack of black pepper.'],
      ],
    },
    'smoked-heirloom-tomato': {
      id: 'smoked-heirloom-tomato',
      name: 'Smoked Heirloom Tomato',
      ingredientId: 'heirloom-tomatoes',
      ingredient: 'Heirloom Tomatoes',
      number: '007',
      season: 'Summer Harvest',
      description: 'A celebration of peak-summer harvest. The Maillard reaction transforms acidity into deep, smoky umami sweetness.',
      prep: '15 mins', total: '45 mins', yield: '4 servings', difficulty: 'Intermediate',
      ingredients: [
        ['Heirloom Tomatoes', '1.2kg, mixed varieties'],
        ['Cold-pressed Rapeseed Oil', '60ml'],
        ['Maldon Sea Salt', 'generous pinch'],
        ['Fresh Lovage', 'small handful'],
        ['Aged Balsamic', '20ml'],
        ['Toasted Sourdough', '2 slices'],
      ],
      note: 'The quality of the oil is paramount. Use a variety with peppery notes to contrast the tomato\'s sweetness.',
      steps: [
        ['Thermal Preparation', 'Preheat a cast iron skillet until it begins to smoke slightly. Avoid non-stick surfaces — you need the raw heat of the metal for the desired char.'],
        ['The Char', 'Place the larger tomato varieties face-down. Do not move them for three minutes. You are looking for a deep, localised char — almost blackened — that infuses the flesh with a wood-smoke profile.'],
        ['Emulsion & Assembly', 'Remove from heat. Drizzle with rapeseed oil and balsamic. The residual heat will emulsify the juices. Tear lovage by hand over the top and season aggressively with Maldon salt.'],
        ['Serve', 'Pile onto toasted sourdough. Eat within minutes while the contrast of char and raw juice is at its peak.'],
      ],
    },
    'pumpkin-soup': {
      id: 'pumpkin-soup',
      name: 'Crown Prince Soup',
      ingredientId: 'pumpkin',
      ingredient: 'Pumpkin',
      number: '008',
      season: 'Autumn',
      description: 'Crown Prince roasted until deeply caramelised, then blended smooth with chilli, ginger and good stock.',
      prep: '20 mins', total: '1 hr 10 mins', yield: '6 servings', difficulty: 'Simple',
      ingredients: [
        ['Crown Prince Pumpkin', '1.5kg, peeled, cubed'],
        ['Good Vegetable Stock', '1 litre'],
        ['Onion', '1 large, quartered'],
        ['Garlic', '6 cloves, unpeeled'],
        ['Fresh Ginger', '40g, sliced'],
        ['Dried Chilli Flakes', '1 tsp'],
        ['Rapeseed Oil', '3 tbsp'],
        ['Double Cream', 'to serve'],
      ],
      note: 'Roasting the pumpkin is non-negotiable. Boiled pumpkin soup is a fundamentally lesser thing.',
      steps: [
        ['Roast', 'Toss the pumpkin, onion, garlic and ginger in oil and spread on roasting trays. Season well. Roast at 200°C for 35–40 minutes until deeply golden and caramelised at the edges.'],
        ['Squeeze the Garlic', 'Squeeze the roasted garlic cloves from their skins. Discard the skins. Add the garlic to the blender with the roasted vegetables.'],
        ['Blend', 'Add the hot stock and blend in batches until completely smooth. Return to a clean pan, add chilli flakes and simmer gently for 5 minutes. Taste for seasoning.'],
        ['Serve', 'Ladle into warmed bowls. Swirl with double cream. A scattering of toasted pumpkin seeds and a drop of chilli oil completes it.'],
      ],
    },
  };

  // ─── SAVE LOGIC ──────────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || 'wild-garlic-pesto';
  const recipe = RECIPES[id];

  function getSaved() { return JSON.parse(localStorage.getItem('larder_saved') || '[]'); }
  function isSaved() { return getSaved().some(r => r.id === id); }

  function updateSaveUI() {
    const saved = isSaved();
    const btn = document.getElementById('save-btn');
    const icon = document.getElementById('save-icon');
    if (!btn) return;
    icon.style.fontVariationSettings = saved ? "'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24" : "'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24";
    btn.style.background = saved ? '#2D331E' : '';
    btn.style.borderColor = saved ? '#2D331E' : '';
    icon.style.color = saved ? '#f9faf3' : '#2D331E';
    btn.setAttribute('aria-label', saved ? 'Remove from saved' : 'Save recipe');
  }

  function toggleSave() {
    if (!recipe) return;
    const saved = getSaved();
    const existing = saved.findIndex(r => r.id === id);
    if (existing >= 0) {
      saved.splice(existing, 1);
    } else {
      saved.unshift({
        id: recipe.id,
        name: recipe.name,
        ingredient: recipe.ingredient,
        ingredientId: recipe.ingredientId,
        time: recipe.total,
        difficulty: recipe.difficulty,
        savedAt: Date.now(),
      });
    }
    localStorage.setItem('larder_saved', JSON.stringify(saved));
    updateSaveUI();

    // Brief visual feedback
    const btn = document.getElementById('save-btn');
    btn.style.transform = 'scale(0.88)';
    setTimeout(() => { btn.style.transform = ''; }, 150);
  }

  // ─── RENDER ──────────────────────────────────────────────────────────────────
  if (!recipe) {
    document.getElementById('main').innerHTML = `
      <div class="text-center py-24">
        <h1 class="distingue text-5xl mb-4">Not Found</h1>
        <p class="italic opacity-55 mb-8">This recipe doesn't exist yet.</p>
        <a href="index.html" class="distingue text-sm uppercase tracking-widest underline">Back to Wheel</a>
      </div>`;
  } else {
    document.title = `LARDER — ${recipe.name}`;

    const stepsHTML = recipe.steps.map(([title, body], i) => `
      <div class="flex flex-col md:flex-row gap-5 fade-in" style="animation-delay:${300 + i * 90}ms">
        <div class="distingue text-[3.5rem] font-bold text-primary leading-none w-14 flex-shrink-0 opacity-15" aria-hidden="true">0${i+1}</div>
        <div class="flex-1">
          <h3 class="distingue italic text-[0.5625rem] tracking-[0.15em] opacity-65 mb-2" style="font-weight:400">${title}</h3>
          <p class="text-xl leading-relaxed">${body}</p>
        </div>
      </div>`).join('');

    const ingredientsHTML = recipe.ingredients.map(([name, qty]) => `
      <li class="py-3 flex justify-between items-baseline" style="border-top:1px solid rgba(45,51,30,0.18)">
        <span class="text-lg">${name}</span>
        <span class="distingue italic text-xs tracking-widest opacity-75" style="font-weight:400">${qty}</span>
      </li>`).join('');

    document.getElementById('main').innerHTML = `
      <!-- Hero -->
      <section class="mb-8 pb-6 divider fade-in">
        <span class="distingue text-[0.5rem] tracking-[0.35em] opacity-65 mb-2 block" style="font-weight:400">Recipe No. ${recipe.number} / ${recipe.season}</span>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-end">
          <div class="lg:col-span-8">
            <h1 class="distingue text-[3.5rem] md:text-[5.5rem] lg:text-[7rem] leading-[0.8]">${recipe.name}</h1>
          </div>
          <div class="lg:col-span-4 lg:border-l lg:border-primary/20 lg:pl-6 py-1">
            <p class="text-xl italic leading-snug opacity-85">${recipe.description}</p>
          </div>
        </div>
      </section>

      <!-- Specs -->
      <section class="grid grid-cols-2 md:grid-cols-4 gap-4 py-5 mb-12 divider fade-in" style="animation-delay:80ms">
        <div><span class="distingue text-[0.5rem] tracking-wide opacity-60 block mb-1" style="font-weight:400">Prep</span><span class="text-xl italic font-semibold">${recipe.prep}</span></div>
        <div><span class="distingue text-[0.5rem] tracking-wide opacity-60 block mb-1" style="font-weight:400">Total</span><span class="text-xl italic font-semibold">${recipe.total}</span></div>
        <div><span class="distingue text-[0.5rem] tracking-wide opacity-60 block mb-1" style="font-weight:400">Yield</span><span class="text-xl italic font-semibold">${recipe.yield}</span></div>
        <div><span class="distingue text-[0.5rem] tracking-wide opacity-60 block mb-1" style="font-weight:400">Difficulty</span><span class="text-xl italic font-semibold">${recipe.difficulty}</span></div>
      </section>

      <!-- Two-column content -->
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">

        <!-- Ingredients aside -->
        <aside class="lg:col-span-4 lg:sticky lg:top-20 h-fit fade-in" style="animation-delay:140ms">
          <h2 class="distingue text-2xl tracking-tight mb-6">The Larder</h2>
          <ul class="space-y-0">${ingredientsHTML}
            <li class="pb-3" style="border-bottom:1px solid rgba(45,51,30,0.18)"></li>
          </ul>
          ${recipe.note ? `
          <div class="mt-6 p-5" style="background:rgba(45,51,30,0.05);border:1px solid rgba(45,51,30,0.15)">
            <span class="distingue text-[0.5rem] tracking-widest opacity-60 block mb-2" style="font-weight:400">Chef's Note</span>
            <p class="italic text-base leading-relaxed">"${recipe.note}"</p>
          </div>` : ''}
        </aside>

        <!-- Method -->
        <section class="lg:col-span-8 fade-in" style="animation-delay:180ms">
          <h2 class="distingue text-2xl tracking-tight mb-8">The Method</h2>
          <div class="space-y-14">${stepsHTML}</div>

          <!-- Actions -->
          <div class="mt-16 pt-8 flex flex-col sm:flex-row gap-3 divider" style="border-top:1px solid rgba(45,51,30,0.18);border-bottom:none">
            <button
              onclick="toggleSave(); this.textContent = isSaved() ? 'REMOVE FROM SAVED' : 'SAVE TO RECIPES'"
              class="flex-1 py-4 bg-outline text-primary distingue font-bold uppercase tracking-widest text-[0.5625rem] hover:bg-primary hover:text-background transition-colors duration-300"
              style="background:#b7c2a7"
            >
              ${isSaved() ? 'REMOVE FROM SAVED' : 'SAVE TO RECIPES'}
            </button>
            <a href="ingredient.html?id=${recipe.ingredientId}" class="flex-1 py-4 text-center distingue font-bold uppercase tracking-widest text-[0.5625rem] transition-colors duration-300" style="border:1px solid rgba(45,51,30,0.25)">
              More ${recipe.ingredient} Recipes
            </a>
          </div>
        </section>
      </div>
    `;

    updateSaveUI();
  }
  </script>
</body>
</html>
